name: LOK CI Debug

on: push

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""

      - name: Install LibreOffice
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice

      - name: Check LOK
        run: |
          ls /usr/lib/libreoffice/program/lib*merged* /usr/lib/libreoffice/program/lib*soffice* 2>/dev/null || echo "none"
          ls /usr/lib/libreoffice/program/soffice.bin

      - name: Run as binary
        run: cargo run 2>&1

      - name: Run as test
        run: cargo test -- --nocapture 2>&1
